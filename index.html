<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haldi Ceremony | Shravani & Abhinav</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="ripple-container"></div>

    <div id="hearts-container"></div>

    <section id="main-page" class="d-flex align-items-center justify-content-center vh-100 position-relative">
        <h1 class="initials floating">S&A</h1>
        <div class="scroll-indicator">
            <p>Scroll to unearth the magic</p>
            <span>↓</span>
        </div>
    </section>

    <section id="invite-page" class="d-flex align-items-center justify-content-center vh-100 position-relative fade-section">
        <div class="invite-card text-center p-4 p-md-5 floating mx-3">
            <p class="haldi-quote">"As turmeric turns to gold, we begin our journey to forever. Join us to bless the beginning of our beautiful union."</p>
            <hr class="divider">
            <p class="lead-text mt-4">We cordially invite you to the Haldi function of</p>
            <h2 class="names my-3">Shravani & Abhinav</h2>
            <p class="date-text">Wednesday, May 13, 2026</p>
            
            <div class="venue-details mt-4">
                <p class="mb-1 fw-bold">Venue:</p>
                <p class="mb-3">Raaga Conventions</p>
                <a href="https://maps.google.com/?q=Raaga+Conventions" target="_blank" class="btn btn-location px-4 py-2">
                    Open in Google Maps
                </a>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
